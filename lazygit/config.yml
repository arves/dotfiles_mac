# Keybindings
keybinding:
  commits:
    moveDownCommit: "<c-v>"
    moveUpCommit: "<c-n>"
gui:
  useHunkModeInStagingView: false
  theme:
    activeBorderColor:
      - "#b4befe" # Catppuccin Lavender
      - bold
    inactiveBorderColor:
      - "#6c7086" # Catppuccin Overlay0
    optionsTextColor:
      - "#89b4fa" # Catppuccin Blue
    selectedLineBgColor:
      - "#45475a" # Catppuccin Surface1 (use "default" for transparent mode)
    cherryPickedCommitBgColor:
      - "#94e2d5" # Catppuccin Teal
    cherryPickedCommitFgColor:
      - "#89b4fa" # Catppuccin Blue
    unstagedChangesColor:
      - "#f38ba8" # Catppuccin Red
    defaultFgColor:
      - "#cdd6f4" # Catppuccin Text (use "default" for transparent mode)
    searchingActiveBorderColor:
      - "#f9e2af" # Catppuccin Yellow
